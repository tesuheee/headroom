name: CI

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*'
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        shell: pwsh
        run: .\build.ps1

      - name: Build fixture binary
        shell: pwsh
        run: .\build.ps1 -DebugFixture

      - name: Test parsers
        shell: pwsh
        run: .\tests\run-tests.ps1
